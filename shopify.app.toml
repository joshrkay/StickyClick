# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "3240537008da20282319cdfdb9c4f2fa"
name = "StickyClick"
application_url = "https://sticky-click.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "customers/data_request" ]
  uri = "/webhooks/customers/data_request"

  [[webhooks.subscriptions]]
  topics = [ "customers/redact" ]
  uri = "/webhooks/customers/redact"

  [[webhooks.subscriptions]]
  topics = [ "shop/redact" ]
  uri = "/webhooks/shop/redact"

[app_proxy]
url = "https://sticky-click.vercel.app/apps/proxy"
subpath = "stickyclick"
prefix = "apps"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_metafields,read_metafields,write_app_proxy,read_discounts"

[auth]
redirect_urls = [
  "https://sticky-click.vercel.app/auth/callback",
  "https://sticky-click.vercel.app/auth/shopify/callback",
  "https://sticky-click.vercel.app/api/auth/callback"
]
